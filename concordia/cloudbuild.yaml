steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/concordia', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/concordia']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'concordia'
      - '--image'
      - 'gcr.io/$PROJECT_ID/concordia'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '3600'
      - '--session-affinity'
      - '--min-instances'
      - '1'
      - '--set-env-vars'
      - 'CONCORDIA_MODEL=gemini-2.0-flash'
